# Деплой на Cloudflare Pages з GitHub Actions (без локального wrangler deploy).
#
# Налаштування один раз:
# 1) Створіть репозиторій на GitHub і запуште цей проєкт (гілка main).
# 2) У Cloudflare уже має бути проєкт Pages з імʼям agronom-com-ua (або змініть нижче).
# 3) GitHub → Settings → Secrets and variables → Actions → New repository secret:
#    CLOUDFLARE_API_TOKEN — API Token з Cloudflare (дозволи: Account → Cloudflare Pages → Edit).
#
# Після push у main: збірка → перевірка реєстру → deploy у production (гілка main на Pages).

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content registry
        run: npm run check:registry

      - name: Build
        run: npm run build:ci
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=agronom-com-ua --branch=main --commit-hash=${{ github.sha }}
